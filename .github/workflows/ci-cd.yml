name: Hone Mobile CI/CD Pipeline

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'

jobs:
  # Code Quality Checks
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze --fatal-infos --fatal-warnings
      
    - name: Check code formatting
      run: dart format --set-exit-if-changed .
      
    - name: Run custom linter
      run: |
        dart pub global activate dart_code_metrics
        dart_code_metrics --reporter=github lib/
        
    - name: Security scan
      run: |
        dart pub global activate dart_devtools
        dart analyze --fatal-infos --fatal-warnings

  # Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run unit tests
      run: flutter test --coverage
      
    - name: Generate coverage report
      run: |
        dart pub global activate coverage
        coverage --lcov --report-on=lib/ --exclude=lib/generated/ --exclude=lib/**/*.g.dart --exclude=lib/**/*.freezed.dart --output=coverage.lcov
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.lcov
        flags: unittests
        name: codecov-umbrella

  # Integration Tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run integration tests
      run: flutter test integration_test/

  # Build Android APK
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Build APK
      run: flutter build apk --release --shrink --dart-define=FLUTTER_WEB_CANVASKIT_ENABLED=true
      
    - name: Build App Bundle
      run: flutter build appbundle --release --shrink --dart-define=FLUTTER_WEB_CANVASKIT_ENABLED=true
      
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-build
        path: build/app/outputs/flutter-apk/app-release.apk
        
    - name: Upload App Bundle artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-bundle
        path: build/app/outputs/bundle/release/app-release.aab

  # Build iOS
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Build iOS
      run: flutter build ios --release --no-codesign --dart-define=FLUTTER_WEB_CANVASKIT_ENABLED=true
      
    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: build/ios/iphoneos/Release-iphoneos/Runner.app

  # Performance Tests
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run performance tests
      run: flutter test --name="performance" --timeout=30s

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Play Store Upload (for releases)
  play-store-upload:
    name: Play Store Upload
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    needs: [analyze, test, build-android]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download App Bundle
      uses: actions/download-artifact@v3
      with:
        name: android-bundle
        path: build/app/outputs/bundle/release/
        
    - name: Setup Google Play CLI
      run: |
        wget -qO - https://dl.google.com/dl/android/maven2/com/google/android/play/cli/com.google.android.play.cli.jar > play-cli.jar
        chmod +x play-cli.jar
        
    - name: Upload to Play Store
      env:
        GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
      run: |
        java -jar play-cli.jar upload \
          --package-name=com.hone.mobile \
          --aab=build/app/outputs/bundle/release/app-release.aab \
          --service-account-key="$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" \
          --track=production

  # Firebase App Distribution
  firebase-distribution:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    needs: [analyze, test, build-android]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download APK
      uses: actions/download-artifact@v3
      with:
        name: android-build
        path: build/app/outputs/flutter-apk/
        
    - name: Setup Firebase CLI
      run: |
        curl -sL https://firebase.tools | bash
        
    - name: Deploy to Firebase App Distribution
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: |
        firebase appdistribution:distribute \
          --app 1:1234567890:android:abcdef123456 \
          --token "$FIREBASE_TOKEN" \
          --release-notes "Latest build from develop branch" \
          --groups "internal-testers" \
          build/app/outputs/flutter-apk/app-release.apk

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          honemobile/hone-mobile:latest
          honemobile/hone-mobile:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Documentation Generation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Generate documentation
      run: |
        dart doc lib/ --show-progress --format=html --output-docs docs/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

  # Release Notes Generation
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Generate changelog
      id: changelog
      run: |
        # Generate changelog from commits
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "# Hone Mobile Release Notes" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## Version ${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🚀 Features" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        git log --pretty=format:"- %s" ${{ github.event.release.target_commitish }}..HEAD | head -10 >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Update Release
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const changelog = `${{ steps.changelog.outputs.CHANGELOG }}`;
          github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            body: changelog,
          });

  # Slack Notification
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    if: always()
    
    needs: [analyze, test, build-android, build-ios]
    
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#hone-mobile'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          *Build Status*: ${{ job.status }}
          *Branch*: ${{ github.ref }}
          *Commit*: ${{ github.sha }}
          *Workflow*: ${{ github.workflow }}

  # Performance Monitoring
  performance-monitor:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run performance benchmarks
      run: |
        flutter test --name="performance" --timeout=30s
        flutter test integration_test/performance_test.dart --timeout=60s
        
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: test_reports/

  # Automated Testing on Real Devices
  real-device-tests:
    name: Real Device Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run tests on BrowserStack
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      run: |
        # Configure BrowserStack
        echo "{
          \"username\": \"$BROWSERSTACK_USERNAME\",
          \"key\": \"$BROWSERSTACK_ACCESS_KEY\",
          \"build\": \"hone-mobile-${{ github.sha }}\",
          \"project\": \"Hone Mobile\"
        }" > browserstack-config.json
        
        # Run tests
        flutter test integration_test/ --device-id="browserstack-${{ matrix.device }}"
      strategy:
        matrix:
          device: ["samsung-s23", "pixel-7", "oneplus-11"]

  # Code Coverage Report
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Run tests with coverage
      run: flutter test --coverage --coverage-path=coverage/lcov.info
      
    - name: Generate HTML coverage report
      run: |
        genhtml coverage/lcov.info -o coverage/html/
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/html/

  # Dependency Check
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Check for outdated dependencies
      run: flutter pub outdated
      
    - name: Check for security vulnerabilities
      run: |
        dart pub global activate safety
        safety check

  # Build Size Analysis
  build-size-analysis:
    name: Build Size Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Build APK
      run: flutter build apk --release --shrink
      
    - name: Analyze APK size
      run: |
        apk_size=$(du -k build/app/outputs/flutter-apk/app-release.apk | cut -f1)
        echo "APK size: ${apk_size}KB"
        
        if [ $apk_size -gt 50000 ]; then
          echo "❌ APK size exceeds 50MB limit"
          exit 1
        else
          echo "✅ APK size is within limits"
        fi
        
    - name: Upload size analysis
      uses: actions/upload-artifact@v3
      with:
        name: build-analysis
        path: build/app/outputs/flutter-apk/

  # Automated Release
  automated-release:
    name: Automated Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Get version
      id: version
      run: echo "version=$(flutter pub deps | grep hone_mobile | head -1 | awk '{print $2}')" >> $GITHUB_OUTPUT
      
    - name: Build APK
      run: flutter build apk --release --shrink
      
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        release_name: Hone Mobile v${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        body: |
          ## 🚀 Hone Mobile v${{ steps.version.outputs.version }}
          
          ### 📱 Features
          - Advanced system optimization
          - Real-time performance monitoring
          - AI-powered recommendations
          - Manufacturer-specific integrations
          
          ### 📦 Downloads
          - [APK](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-release.apk)
          
          ### 🔗 Links
          - [Installation Guide](https://github.com/${{ github.repository }}/blob/main/README.md)
          - [Documentation](https://hone-mobile-docs.vercel.app)
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build/app/outputs/flutter-apk/app-release.apk
        asset_name: hone-mobile-v${{ steps.version.outputs.version }}.apk
        asset_content_type: application/vnd.android.package-archive
